<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VESL Protocol</title>
    <style>
        :root {
            --color-cream: #FFDEAD;
            --color-green: #006400;
            --color-orange: #FF8C00;
            --color-bg: #080A14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; -webkit-touch-callout: none; user-select: none; touch-action: none; }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--color-bg); color: var(--color-cream); text-transform: uppercase;}
        canvas { display: block; image-rendering: pixelated; }

        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #timer-display { position: absolute; top: 20px; left: 20px; font-size: 1.8rem; color: var(--color-orange); font-weight: bold; text-shadow: 2px 2px #000; }
        
        #health-container { position: absolute; top: 20px; right: 20px; text-align: right; }
        #health-label { font-size: 0.8rem; color: #FFF; margin-bottom: 5px; font-weight: bold; text-shadow: 1px 1px #000; }
        #health-slots { display: flex; gap: 5px; justify-content: flex-end; }
        .health-slot { width: 25px; height: 12px; border: 2px solid var(--color-green); background: rgba(0, 100, 0, 0.2); }
        .filled { background: var(--color-orange); box-shadow: 0 0 8px var(--color-orange); }

        #mission-header { position: absolute; top: 70px; width: 100%; text-align: center; color: var(--color-orange); font-weight: bold; font-size: 0.9rem; text-shadow: 2px 2px #000; letter-spacing: 1px; display: none; }

        .ui-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; background: rgba(8, 10, 20, 0.95); width: 85%; max-width: 400px; padding: 30px; border: 4px solid var(--color-green); text-align: center; pointer-events: auto; }
        .active { display: flex; }
        
        h1 { font-size: 1.6rem; color: var(--color-orange); margin-bottom: 15px; }
        .diff-container { display: flex; gap: 10px; margin: 15px 0; }
        .diff-btn { padding: 8px 12px; background: transparent; border: 2px solid var(--color-green); color: white; cursor: pointer; font-family: inherit; }
        .diff-btn.selected { background: var(--color-green); border-color: white; }
        .start-btn { padding: 15px 30px; font-size: 1.2rem; background: var(--color-green); color: white; border: 3px solid white; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; }
        .ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; background: rgba(0, 100, 0, 0.4); border: 3px solid var(--color-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="timer-display">00:30</div>
        <div id="health-container">
            <div id="health-label">SHIELD INTEGRITY</div>
            <div id="health-slots">
                <div class="health-slot filled"></div><div class="health-slot filled"></div>
                <div class="health-slot filled"></div><div class="health-slot filled"></div>
            </div>
        </div>
        <div id="mission-header">PROTECT THE JUNIOR VESL</div>

        <div id="intro-screen" class="ui-screen active">
            <h1>VESL PROTOCOL</h1>
            <p>PROTECT THE JUNIOR VESL.</p>
            <p>FIRE AT METEORS AND MAKE A SAFE PATH TO YOUR DESTINATION.</p>
            <div class="diff-container">
                <button class="diff-btn" onclick="setDiff(1.2, 2, this)">EASY</button>
                <button class="diff-btn selected" onclick="setDiff(2.2, 3, this)">NORMAL</button>
                <button class="diff-btn" onclick="setDiff(3.5, 5, this)">CHALLENGING</button>
            </div>
            <button id="start-btn" class="start-btn">ENGAGE</button>
        </div>

        <div id="end-screen" class="ui-screen">
            <h1 id="end-status">SUCCESS</h1>
            <p id="end-message"></p>
            <button id="restart-btn" class="start-btn">RETRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="ctrl-group"><div id="left-btn" class="btn">◀</div><div id="right-btn" class="btn">▶</div></div>
        <div class="ctrl-group"><div id="fire-btn" class="btn">FIRE</div></div>
    </div>

    <script>
        const Sound = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                
                if (type === 'fire') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(); osc.stop(now + 0.1);
                } else if (type === 'impact') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                } else if (type === 'thruster') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 1.5);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 1.5);
                    osc.start(); osc.stop(now + 1.5);
                } else if (type === 'success') {
                    osc.type = 'triangle'; [440, 554, 659, 880].forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.1));
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                    osc.start(); osc.stop(now + 0.5);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(50, now + 0.6);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.6);
                    osc.start(); osc.stop(now + 0.6);
                }
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, mainShip, smallShip, bullets, meteors, particles, stars, gameState, planet;
        let timeLeft = 30, health = 4, gameInterval, shake = 0, fadeAlpha = 1.0;
        let keys = { ArrowLeft: false, ArrowRight: false };
        let spawnRate = 2.2, meteorSpeedBase = 3;

        function setDiff(rate, speed, btn) {
            spawnRate = rate; meteorSpeedBase = speed;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mainShip = { x: width/2 - 30, y: height - 280, targetX: width/2 - 30, w: 60, h: 90, flash: 0 };
            smallShip = { x: width/2 - 20, y: height - 160, w: 40, h: 50, vel: 1.5, nextChange: 0, flash: 0 };
            bullets = []; meteors = []; particles = []; stars = [];
            timeLeft = 30; health = 4; gameState = 'intro'; fadeAlpha = 1.0;
            planet = { y: height + 300, size: width * 1.5 };
            for(let i=0; i<60; i++) stars.push({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2, sp: 0.3 + Math.random()*0.5 });
            updateHealthUI();
        }

        function triggerHit() {
            health--; shake = 15; mainShip.flash = 20; Sound.play('impact'); updateHealthUI();
            if (navigator.vibrate) navigator.vibrate(80);
            if(health <= 0) endGame(false);
        }

        function drawMainShip(x, y, thrusters = true) {
            ctx.save(); ctx.translate(x, y);
            const isFlashing = mainShip.flash > 0 && Math.floor(mainShip.flash / 4) % 2 === 0;
            const bodyColor = isFlashing ? '#FF0000' : '#FFDEAD';
            const finColor = isFlashing ? '#AA0000' : '#006400';
            if (mainShip.flash > 0) mainShip.flash--;
            ctx.fillStyle = finColor; ctx.fillRect(6, 40, 9, 45); ctx.fillRect(45, 40, 9, 45);
            ctx.fillStyle = bodyColor; ctx.fillRect(15, 18, 30, 54);
            ctx.beginPath(); ctx.moveTo(15, 18); ctx.lineTo(30, 0); ctx.lineTo(45, 18); ctx.fillStyle = finColor; ctx.fill();
            ctx.fillStyle = '#FF8C00'; ctx.beginPath(); ctx.arc(30, 36, 7, 0, Math.PI*2); ctx.fill();
            if(thrusters && Math.random() > 0.3) { ctx.fillStyle = '#FF8C00'; ctx.fillRect(20, 72, 6, 12); ctx.fillRect(34, 72, 6, 12); }
            ctx.restore();
        }

        function drawSmallShip(x, y, thrusters = true) {
            ctx.save(); ctx.translate(x, y);
            if(smallShip.flash > 0) { ctx.filter = 'brightness(3) sepia(1)'; smallShip.flash--; }
            ctx.fillStyle = '#666'; ctx.fillRect(5, 15, 30, 20);
            ctx.fillStyle = '#006400'; ctx.fillRect(0, 22, 40, 6);
            ctx.fillStyle = '#FFDEAD'; ctx.fillRect(15, 5, 10, 8);
            if(thrusters && Math.random() > 0.3) { ctx.fillStyle = '#00FFFF'; ctx.fillRect(18, 35, 4, 6); }
            ctx.restore();
        }

        function fire() {
            if(gameState !== 'playing') return;
            bullets.push({ x: mainShip.x + 10, y: mainShip.y + 40 });
            bullets.push({ x: mainShip.x + 50, y: mainShip.y + 40 });
            Sound.play('fire');
        }

        function updateHealthUI() {
            const slots = document.querySelectorAll('.health-slot');
            slots.forEach((slot, i) => { i < health ? slot.classList.add('filled') : slot.classList.remove('filled'); });
        }

        function update() {
            stars.forEach(s => { s.y += s.sp; if(s.y > height) s.y = -5; });
            if(gameState === 'playing') {
                if(keys.ArrowLeft) mainShip.targetX -= 5;
                if(keys.ArrowRight) mainShip.targetX += 5;
                mainShip.targetX = Math.max(0, Math.min(width - mainShip.w, mainShip.targetX));
                mainShip.x += (mainShip.targetX - mainShip.x) * 0.12;
                smallShip.x += smallShip.vel;
                if(Date.now() > smallShip.nextChange) { smallShip.vel = (Math.random() - 0.5) * 4; smallShip.nextChange = Date.now() + 2000; }
                if(smallShip.x < 20 || smallShip.x > width - 60) smallShip.vel *= -1;
                bullets.forEach((b, i) => { b.y -= 14; if(b.y < -20) bullets.splice(i, 1); });
                meteors.forEach((m, mi) => {
                    m.y += m.sp;
                    if(Math.hypot(m.x - (mainShip.x+30), m.y - (mainShip.y+45)) < m.r + 25) { meteors.splice(mi, 1); createParticles(m.x, m.y, 8, 'orange'); triggerHit(); }
                    else if(Math.hypot(m.x - (smallShip.x+20), m.y - (smallShip.y+25)) < m.r + 15) { meteors.splice(mi, 1); smallShip.flash = 12; createParticles(smallShip.x+20, smallShip.y+25, 10, 'red'); triggerHit(); }
                    bullets.forEach((b, bi) => { if(Math.hypot(m.x - b.x, m.y - b.y) < m.r + 20) { meteors.splice(mi, 1); bullets.splice(bi, 1); createParticles(m.x, m.y, 10, '#5C4033'); Sound.play('impact'); } });
                    if(m.y > height + 50) meteors.splice(mi, 1);
                });
                if(Math.random() * 100 < spawnRate) meteors.push({ x: Math.random()*width, y: -50, r: 15 + Math.random()*20, sp: meteorSpeedBase + Math.random()*2 });
            }
            if(gameState === 'landing') {
                mainShip.x += (width/2 - 45 - mainShip.x) * 0.06;
                smallShip.x += (width/2 + 15 - smallShip.x) * 0.06;
                if(planet.y > height * 0.55) planet.y -= 2.5;
                if(planet.y < height * 0.8) { mainShip.y += 1.2; smallShip.y += 1.2; createParticles(mainShip.x + 30, mainShip.y + 80, 1, 'rgba(200,200,200,0.3)', 2, 0); }
                if(fadeAlpha > 0) fadeAlpha -= 0.02; else { meteors = []; bullets = []; }
                if(mainShip.y > planet.y - 40) { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); gameState = 'finished'; Sound.play('success'); showEndUI(true); }
            }
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy + 2; p.l--; if(p.l <= 0) particles.splice(i, 1); });
            if(shake > 0) shake--;
        }

        function createParticles(x, y, n, c, vx=4, vy=4) { for(let i=0; i<n; i++) particles.push({ x, y, vx:(Math.random()-0.5)*vx, vy:(Math.random()-0.5)*vy, l:25, color:c }); }

        function draw() {
            ctx.save(); if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
            ctx.fillStyle = '#080A14'; ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = 'white'; stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
            if(gameState === 'landing' || gameState === 'finished') { ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(width/2, planet.y + planet.size/2, planet.size/2, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#444'; ctx.lineWidth = 4; ctx.stroke(); }
            ctx.save(); ctx.globalAlpha = Math.max(0, fadeAlpha); bullets.forEach(b => { ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 4, 15); }); meteors.forEach(m => { ctx.fillStyle = '#5C4033'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); }); ctx.restore();
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            drawMainShip(mainShip.x, mainShip.y, gameState !== 'finished'); drawSmallShip(smallShip.x, smallShip.y, gameState !== 'finished');
            ctx.restore(); update(); requestAnimationFrame(draw);
        }

        function endGame(success) {
            if(gameState === 'over' || gameState === 'landing') return;
            gameState = success ? 'landing' : 'over';
            if(success) Sound.play('thruster');
            document.getElementById('controls').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('mission-header').style.display = 'none';
            clearInterval(gameInterval);
            if(!success) { Sound.play('fail'); if (navigator.vibrate) navigator.vibrate(300); showEndUI(false); }
        }

        function showEndUI(win) {
            document.getElementById('end-status').innerText = win ? "MISSION SUCCESS" : "MISSION FAILED";
            document.getElementById('end-status').style.color = win ? "var(--color-orange)" : "red";
            document.getElementById('end-message').innerText = win ? "SAFE ARRIVAL TO DESTINATION." : "MISSION TERMINATED.";
            document.getElementById('end-screen').classList.add('active');
        }

        window.addEventListener('keydown', e => { if(e.code === 'ArrowLeft') { keys.ArrowLeft = true; mainShip.targetX -= 40; } if(e.code === 'ArrowRight') { keys.ArrowRight = true; mainShip.targetX += 40; } if(e.code === 'Space') fire(); });
        window.addEventListener('keyup', e => { if(e.code === 'ArrowLeft') keys.ArrowLeft = false; if(e.code === 'ArrowRight') keys.ArrowRight = false; });
        const bind = (id, act) => { const el = document.getElementById(id); const start = (e) => { e.preventDefault(); Sound.init(); if(act === 'L') mainShip.targetX -= 60; if(act === 'R') mainShip.targetX += 60; if(act === 'F') fire(); }; el.addEventListener('touchstart', start); el.addEventListener('mousedown', start); };
        document.getElementById('start-btn').onclick = () => { Sound.init(); init(); gameState = 'playing'; document.getElementById('intro-screen').classList.remove('active'); document.getElementById('controls').style.display = 'flex'; document.getElementById('mission-header').style.display = 'block'; gameInterval = setInterval(() => { timeLeft--; let s = timeLeft.toString().padStart(2,'0'); document.getElementById('timer-display').innerText = `00:${s}`; if(timeLeft <= 0) endGame(true); }, 1000); };
        document.getElementById('restart-btn').onclick = () => location.reload();
        bind('left-btn', 'L'); bind('right-btn', 'R'); bind('fire-btn', 'F');
        init(); draw();
    </script>
</body>
</html>
